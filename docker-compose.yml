# HOOPS 스트리밍 뷰어 프로토타입 - Windows Docker Desktop
# 실행: streaming-viewer-prototype 폴더에서 docker compose up --build
# 브라우저: http://localhost:3010

services:
  # HOOPS Spawn Server (ts3d_sc_server 풀 관리)
  # 빌드 시 상위 디렉터리(HOOPS 패키지 루트)에서 server, web_viewer를 이미지에 복사하여
  # Windows에서 볼륨 마운트 없이도 동작합니다.
  hoops-spawn:
    build:
      # .env의 HOOPSS_PACKAGE_PATH 사용(권장). 미설정 시 상대 경로 ../ 사용.
      # Windows에서는 절대 경로를 쓰면 빌드 컨텍스트가 명확해집니다.
      context: ${HOOPSS_PACKAGE_PATH:-../}
      dockerfile: streaming-viewer-prototype/Dockerfile.hoops
    container_name: hoops-spawn
    volumes:
      # Docker 전용 설정 (communicatorDir, modelDirs 등). 선택 사항.
      - ./hoops-docker-config.js:/app/hoops-config.js:ro
      # 업로드된 SC 모델 공유: 호스트(프로젝트/uploads) → 컨테이너 /app/hoops/uploads (컨버팅 없이 다이렉트 스트리밍)
      - ./uploads:/app/hoops/uploads
    environment:
      - NODE_ENV=production
      - HOOPSS_COMMUNICATOR_DIR=/app/hoops
      # 라이선스: 기존 Config의 license 키 사용 또는 HOOPSS_LICENSE 설정
      - HOOPSS_LICENSE=${HOOPSS_LICENSE:-}
    ports:
      - "11182:11182"   # Spawn REST API
      - "11180:11180"   # File server (정적 리소스)
      - "11000-11031:11000-11031"  # SC Server WebSocket 포트 풀
    command: >
      sh -c "if [ ! -f /app/hoops/server/bin/linux64/ts3d_sc_server ]; then
        echo 'ERROR: ts3d_sc_server not found in image. Rebuild with: docker compose up --build';
        exit 1;
      fi;
      chmod +x /app/hoops/server/bin/linux64/ts3d_sc_server 2>/dev/null || true;
      cd /app/hoops/server/node && npm install --omit=dev 2>/dev/null || true;
      cd /app/hoops && node --expose-gc server/node/lib/Startup.js --config-file /app/hoops-config.js"
    working_dir: /app/hoops
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:11182/api/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Nest.js API + React 정적 서버 (프론트엔드 + /api/spawn, /api/upload). DWG/STEP/IGES 변환 시 상위 컨텍스트에서 converter 포함
  app:
    build:
      context: ${HOOPSS_PACKAGE_PATH:-../}
      dockerfile: streaming-viewer-prototype/Dockerfile.app
    container_name: streaming-viewer-app
    ports:
      - "3010:3000"
    environment:
      - NODE_ENV=production
      - HOOPSS_SPAWN_URL=http://hoops-spawn:11182
      - HOOPSS_WS_HOST=${HOOPSS_WS_HOST:-localhost}
      - HOOPSS_LICENSE=${HOOPSS_LICENSE:-}
    volumes:
      # 업로드된 파일 저장: 호스트(프로젝트/uploads) → 컨테이너 /app/uploads
      - ./uploads:/app/uploads
    depends_on:
      hoops-spawn:
        condition: service_healthy
    restart: unless-stopped

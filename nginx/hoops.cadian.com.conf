# HOOPS 스트리밍 뷰어 - hoops.cadian.com
# HTTP → app(3010). WebSocket(11000~11031)은 Docker가 호스트에 직접 노출하므로 브라우저가 hoops.cadian.com:11000 등으로 접속.

upstream app {
    server 127.0.0.1:3010;
    keepalive 32;
}

server {
    listen 80;
    server_name hoops.cadian.com;

    client_max_body_size 100M;

    location / {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /api/ {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /web_viewer/ {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket: path 기반 /streaming/<port> → 127.0.0.1:<port> (WSS 사용 시 필수)
    location ~ ^/streaming/(11000|11001|11002|11003|11004|11005|11006|11007|11008|11009|11010|11011|11012|11013|11014|11015|11016|11017|11018|11019|11020|11021|11022|11023|11024|11025|11026|11027|11028|11029|11030|11031)$ {
        set $ws_port $1;
        proxy_pass http://127.0.0.1:$ws_port/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

